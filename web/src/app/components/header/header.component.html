<header class="site-header">

  <!-- Barra de anuncios -->
  <div class="announcement-bar">
    <div class="announcement-track">
      <span>ENVÍO GRATIS EN COMPRAS SUPERIORES A $50.000</span>
      <span class="separator">✦</span>
      <span>10% OFF CON TRANSFERENCIA BANCARIA</span>
      <span class="separator">✦</span>
      <span>3 CUOTAS SIN INTERÉS</span>
      <span class="separator">✦</span>
      <span>ENVÍO GRATIS EN COMPRAS SUPERIORES A $50.000</span>
      <span class="separator">✦</span>
      <span>10% OFF CON TRANSFERENCIA BANCARIA</span>
      <span class="separator">✦</span>
      <span>3 CUOTAS SIN INTERÉS</span>
      <span class="separator">✦</span>
    </div>
  </div>

  <!-- Navbar principal -->
  <nav class="navbar">

    <!-- Logo -->
    <a class="logo" routerLink="/">GLAMOURS</a>

    <!-- Buscador -->
    <div class="search-bar">
      <input
        type="text"
        class="search-input"
        placeholder="¿Qué estás buscando?"
        [value]="searchQuery()"
        (input)="onSearch($event)"
        (keydown)="onSearchKeydown($event)"
      />
      <button class="search-btn" (click)="onSearchSubmit()" aria-label="Buscar">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>

    <!-- Acciones -->
    <div class="nav-actions">

      <!-- Login / Registro -->
      <button class="btn-auth" routerLink="/auth">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>Entrá / Registrate</span>
      </button>

      <!-- Carrito -->
      <button class="btn-cart">
        <div class="cart-icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          @if (cartCount() > 0) {
            <span class="cart-badge">{{ cartCount() }}</span>
          }
        </div>
        <div class="cart-info">
          <span class="cart-label">Carrito</span>
          <span class="cart-total">${{ cartTotal().toLocaleString('es-AR') }}</span>
        </div>
      </button>

    </div>
  </nav>

</header>
